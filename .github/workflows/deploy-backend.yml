name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'scripts/deploy-ec2.sh'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies for validation
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/deploy-temp
            cd /home/${{ secrets.EC2_USERNAME }}/deploy-temp

            if [ -d .git ]; then
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            else
              git clone https://github.com/saurabh260120/youtube_rag.git .
            fi

            chmod +x scripts/deploy-ec2.sh
            EC2_USERNAME="${{ secrets.EC2_USERNAME }}" \
            EC2_APP_DIR="/home/${{ secrets.EC2_USERNAME }}/youtube-backend" \
            REPO_URL="https://github.com/saurabh260120/youtube_rag.git" \
            BRANCH="main" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            PINECONE_INDEX_NAME="${{ secrets.PINECONE_INDEX_NAME }}" \
            MONGO_URI="${{ secrets.MONGO_URI }}" \
            RABBITMQ_URL="${{ secrets.RABBITMQ_URL }}" \
            /bin/bash ./scripts/deploy-ec2.sh
